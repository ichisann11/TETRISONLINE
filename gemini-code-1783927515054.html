<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Tetris</title>
<style>
  body { 
    background: #2b2b2b; 
    color: #ffffff; 
    text-align: center; 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    margin: 0;
    padding: 20px;
  }
  h1 { margin-bottom: 5px; }
  canvas { 
    border: solid 2px #4caf50; 
    background: #111; 
    margin-top: 15px; 
    box-shadow: 0 0 15px rgba(76, 175, 80, 0.5);
  }
  #score { 
    font-size: 24px; 
    font-weight: bold;
    color: #4caf50;
  }
  .controls {
    margin-top: 15px;
    font-size: 14px;
    color: #aaa;
  }
</style>
</head>
<body>
  <h1>ブラウザ・テトリス</h1>
  <div id="score">Score: 0</div>
  <canvas id="tetris" width="240" height="400"></canvas>
  <div class="controls">
    <p>操作方法: [←][→] 左右移動 | [↓] 落下 | [↑] 回転</p>
  </div>

  <script>
    const canvas = document.getElementById('tetris');
    const context = canvas.getContext('2d');
    context.scale(20, 20); // 1ブロックを20x20ピクセルに設定 (横12列 x 縦20行)

    // ブロックが揃ったかチェックして消す処理
    function arenaSweep() {
        let rowCount = 1;
        outer: for (let y = arena.length - 1; y > 0; --y) {
            for (let x = 0; x < arena[y].length; ++x) {
                if (arena[y][x] === 0) {
                    continue outer;
                }
            }
            const row = arena.splice(y, 1)[0].fill(0);
            arena.unshift(row);
            ++y;
            player.score += rowCount * 100;
            rowCount *= 2;
        }
    }

    // 当たり判定
    function collide(arena, player) {
        const m = player.matrix;
        const o = player.pos;
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 &&
                   (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                    return true;
                }
            }
        }
        return false;
    }

    // フィールドの生成
    function createMatrix(w, h) {
        const matrix = [];
        while (h--) {
            matrix.push(new Array(w).fill(0));
        }
        return matrix;
    }

    // ブロック（テトリミノ）の形を定義
    function createPiece(type) {
        if (type === 'I') { return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]]; }
        else if (type === 'L') { return [[0, 2, 0], [0, 2, 0], [0, 2, 2]]; }
        else if (type === 'J') { return [[0, 3, 0], [0, 3, 0], [3, 3, 0]]; }
        else if (type === 'O') { return [[4, 4], [4, 4]]; }
        else if (type === 'Z') { return [[5, 5, 0], [0, 5, 5], [0, 0, 0]]; }
        else if (type === 'S') { return [[0, 6, 6], [6, 6, 0], [0, 0, 0]]; }
        else if (type === 'T') { return [[0, 7, 0], [7, 7, 7], [0, 0, 0]]; }
    }

    // 描画処理
    function drawMatrix(matrix, offset) {
        matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    context.fillStyle = colors[value];
                    context.fillRect(x + offset.x, y + offset.y, 1, 1);
                    // ブロックの枠線
                    context.strokeStyle = 'rgba(0,0,0,0.5)';
                    context.lineWidth = 0.05;
                    context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                }
            });
        });
    }

    function draw() {
        context.fillStyle = '#111';
        context.fillRect(0, 0, canvas.width, canvas.height);
        drawMatrix(arena, {x: 0, y: 0});
        drawMatrix(player.matrix, player.pos);
    }

    // フィールドにブロックを固定する
    function merge(arena, player) {
        player.matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    arena[y + player.pos.y][x + player.pos.x] = value;
                }
            });
        });
    }

    // ブロックを落とす
    function playerDrop() {
        player.pos.y++;
        if (collide(arena, player)) {
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
            updateScore();
        }
        dropCounter = 0;
    }

    // 左右移動
    function playerMove(offset) {
        player.pos.x += offset;
        if (collide(arena, player)) {
            player.pos.x -= offset;
        }
    }

    // 新しいブロックをセット（一番上まで積まれていたらリセット）
    function playerReset() {
        const pieces = 'TJLOSZI';
        player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
        player.pos.y = 0;
        player.pos.x = (Math.floor(arena[0].length / 2)) - (Math.floor(player.matrix[0].length / 2));
        
        if (collide(arena, player)) {
            arena.forEach(row => row.fill(0));
            player.score = 0;
            updateScore();
        }
    }

    // 回転
    function playerRotate(dir) {
        const pos = player.pos.x;
        let offset = 1;
        rotate(player.matrix, dir);
        while (collide(arena, player)) {
            player.pos.x += offset;
            offset = -(offset + (offset > 0 ? 1 : -1));
            if (offset > player.matrix[0].length) {
                rotate(player.matrix, -dir);
                player.pos.x = pos;
                return;
            }
        }
    }

    function rotate(matrix, dir) {
        for (let y = 0; y < matrix.length; ++y) {
            for (let x = 0; x < y; ++x) {
                [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
        }
        if (dir > 0) { matrix.forEach(row => row.reverse()); } 
        else { matrix.reverse(); }
    }

    // ゲームループ変数
    let dropCounter = 0;
    let dropInterval = 1000;
    let lastTime = 0;

    function update(time = 0) {
        const deltaTime = time - lastTime;
        lastTime = time;
        dropCounter += deltaTime;
        
        if (dropCounter > dropInterval) {
            playerDrop();
        }
        draw();
        requestAnimationFrame(update);
    }

    function updateScore() {
        document.getElementById('score').innerText = 'Score: ' + player.score;
    }

    // ブロックの色
    const colors = [
        null, '#00bcd4', '#2196f3', '#ff9800',
        '#ffeb3b', '#4caf50', '#9c27b0', '#f44336'
    ];

    const arena = createMatrix(12, 20);
    const player = {
        pos: {x: 0, y: 0},
        matrix: null,
        score: 0,
    };

    // キーボード操作の設定
    document.addEventListener('keydown', event => {
        if (event.keyCode === 37) { playerMove(-1); }      // 左矢印
        else if (event.keyCode === 39) { playerMove(1); }  // 右矢印
        else if (event.keyCode === 40) { playerDrop(); }   // 下矢印
        else if (event.keyCode === 38) { playerRotate(1); }// 上矢印
    });

    // ゲームスタート
    playerReset();
    updateScore();
    update();
  </script>
</body>
</html>
